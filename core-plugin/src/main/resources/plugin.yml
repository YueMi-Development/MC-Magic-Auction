name: '${pluginName}'
version: '${version}'
main: org.yuemi.magicauction.plugin.MagicAuctionPlugin
authors: [${authors}]
contributors: [${contributors}]
api-version: '${apiVersion}'

depend: [
  YueMiLibs
]

bstats-id: '${bstatsPluginId}'

commands:
  magicauction:
    description: "Main command for Magic Auction"
    permission: "magicauction.admin"
    usage: "/magicauction"
  matchmaking:
    description: "Join or leave an auction matchmaking queue"
    permission: "magicauction.matchmaking"
    usage: "/matchmaking <join|leave>"
